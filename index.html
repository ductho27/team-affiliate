<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Đức Thọ & Affiliate</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --success-color: #28a745;
            --bg-color: #f4f7f6;
            --danger-color: #d9534f;
            --purple-tho: #6f42c1; /* Màu tím cho thầy bói */
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 10px;
            color: #333;
        }

        .container { 
            max-width: 600px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        h2 { color: var(--primary-color); font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
        h4 { margin-bottom: 15px; color: #555; }

        #login-screen { padding: 10px 0; }
        #main-content { display: none; }

        .team-section { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding: 10px 0; 
            margin-bottom: 20px;
        }

        .member-card { text-align: center; font-size: 14px; font-weight: bold; }
        .member-card img { 
            width: 70px; height: 70px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid #eef2f7;
        }

        .converter-box { 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        /* Khu vực bói toán */
        .fortune-box {
            background: #fff0f6;
            border: 2px dashed var(--purple-tho);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        input { 
            width: 100%; box-sizing: border-box;
            padding: 12px 15px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            font-size: 16px; 
        }

        button { 
            width: 100%; 
            background: var(--success-color); 
            color: white; border: none; 
            padding: 14px; border-radius: 10px; 
            cursor: pointer; font-size: 16px; font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }
        .btn-fortune { background: var(--purple-tho); }
        .btn-logout { background: #6c757d; margin-top: 15px; padding: 10px; font-size: 14px; }

        #result, #fortune-result { 
            margin-top: 15px; 
            font-weight: bold; 
            padding: 10px; 
            border-radius: 8px;
            display: none;
        }

        .aff-links a { 
            display: flex; align-items: center; justify-content: center;
            background: white; color: var(--primary-color); 
            text-decoration: none; padding: 15px; margin: 12px 0; 
            border-radius: 12px; border: 1px solid #e0e6ed; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>Đăng nhập Hệ thống</h2>
        <div class="converter-box">
            <input type="text" id="staffIdInput" placeholder="Nhập mã nhân viên (V001, V002...)">
            <button onclick="handleLogin()">Vào Hệ Thống</button>
            <p id="login-msg" style="color: var(--danger-color); margin-top: 10px; font-weight: bold; text-align: center;"></p>
        </div>
    </div>

    <div id="main-content">
        <h2 id="welcome-msg">Chào mừng bạn!</h2>
        
        <div class="team-section">
            <div class="member-card">
                <img src="images.jpg" alt="Duc Tho"><p>Duc Tho</p>
            </div>
            <div class="member-card">
                <img src="admin2.jpg" alt="Bảnh Bỏn"><p>Bảnh Bỏn</p>
            </div>
        </div>

        <div class="converter-box">
            <h4>🛒 Chuyển đổi Link Shopee</h4>
            <input type="text" id="rawLink" placeholder="Dán link sản phẩm Shopee...">
            <button onclick="convertLink()">Lấy Link Affiliate</button>
            <div id="result"></div>
        </div>

        <div class="fortune-box">
            <h4 style="color: var(--purple-tho);">🔮 Thầy Thọ Phán Quẻ</h4>
            <input type="text" id="fortuneQuestion" placeholder="Hỏi thầy: Bao giờ lấy chồng? Giàu không?">
            <button class="btn-fortune" onclick="askMasterTho()">Xem Quẻ Ngay</button>
            <div id="fortune-result" style="background: white; color: var(--purple-tho); border: 1px solid var(--purple-tho);"></div>
        </div>

        <div class="aff-links">
            <h4>Sản phẩm khuyên dùng</h4>
            <a href="#" target="_blank">💻 Máy tính X99 Cấu Hình Khủng</a>
            <a href="#" target="_blank">🎧 Tai nghe Kiểm âm DJ</a>
        </div>

        <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
    </div>
</div>

<script>
    // --- THỌ CẬP NHẬT LINK NGROK TẠI ĐÂY ---
    const BASE_URL = "https://eaa8-2001-ee0-4141-611d-f998-7707-f08c-c584.ngrok-free.app/convert"; 

    async function handleLogin() {
        const staffId = document.getElementById('staffIdInput').value.trim().toUpperCase();
        const msg = document.getElementById('login-msg');
        if (!staffId) return msg.innerText = "⚠️ Nhập mã nhân viên Thọ ơi!";

        try {
            const response = await fetch('employees.json');
            const userList = await response.json();
            if (userList[staffId]) {
                localStorage.setItem('userName', userList[staffId]);
                localStorage.setItem('staffId', staffId);
                showMainContent(userList[staffId]);
            } else {
                msg.innerText = "❌ Mã không tồn tại!";
            }
        } catch (err) { msg.innerText = "⚠️ Lỗi: Kiểm tra file employees.json!"; }
    }

    function showMainContent(name) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `Chào bạn, ${name}! 👋`;
    }

    function handleLogout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const savedName = localStorage.getItem('userName');
        if (savedName) showMainContent(savedName);
    }

    // --- HÀM 1: CHUYỂN LINK (GỌI QUA PYTHON) ---
    async function convertLink() {
        const userLink = document.getElementById('rawLink').value.trim();
        const resDiv = document.getElementById('result');
        if(!userLink) return alert("Dán link đã Thọ ơi!");

        resDiv.style.display = "block";
        resDiv.style.color = "var(--primary-color)";
        resDiv.innerText = "🔍 Đang điều khiển Bot... chờ xíu nhé!";

        try {
            const response = await fetch(`${BASE_URL}/convert`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link: userLink })
            });
            const data = await response.json();
            if (data.affiliate_link) {
                resDiv.innerHTML = `✅ Xong! <a href="${data.affiliate_link}" target="_blank" style="color: var(--success-color);">Mở Link Affiliate</a>`;
            } else { resDiv.innerText = "❌ Lỗi: " + (data.error || "Thử lại sau"); }
        } catch (err) { resDiv.innerText = "🚫 Check Ngrok/Server Thọ ơi!"; }
    }

    // --- HÀM 2: BÓI TOÁN (GỌI QUA PYTHON) ---
    async function askMasterTho() {
        const question = document.getElementById('fortuneQuestion').value.trim();
        const resDiv = document.getElementById('fortune-result');
        if(!question) return alert("Hỏi gì đi chứ Thọ!");

        resDiv.style.display = "block";
        resDiv.innerText = "🔮 Thầy Thọ đang gieo quẻ...";

        try {
            const response = await fetch(`${BASE_URL}/fortune`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();
            resDiv.innerText = "🔮 " + data.answer;
        } catch (err) { resDiv.innerText = "🚫 Thầy đang đi vắng (Check Ngrok)!"; }
    }
</script>
</body>
</html>
