<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Đức Thọ & Affiliate</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --success-color: #28a745;
            --bg-color: #f4f7f6;
            --danger-color: #d9534f;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 10px;
            color: #333;
        }

        .container { 
            max-width: 600px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        h2 { color: var(--primary-color); font-size: 1.5rem; margin-bottom: 20px; }
        h4 { margin-bottom: 15px; color: #555; }

        /* Màn hình đăng nhập */
        #login-screen { padding: 10px 0; }

        /* Nội dung chính */
        #main-content { display: none; }

        .team-section { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding: 10px 0; 
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .member-card img { 
            width: 70px; height: 70px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid #eef2f7;
        }

        .converter-box { 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        input { 
            width: 100%; box-sizing: border-box;
            padding: 12px 15px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            font-size: 16px; 
        }

        button { 
            width: 100%; 
            background: var(--success-color); 
            color: white; border: none; 
            padding: 14px; border-radius: 10px; 
            cursor: pointer; font-size: 16px; font-weight: bold;
        }

        .btn-logout { background: #6c757d; margin-top: 15px; padding: 10px; font-size: 14px; }

        .aff-links a { 
            display: flex; align-items: center; justify-content: center;
            background: white; color: var(--primary-color); 
            text-decoration: none; padding: 15px; margin: 12px 0; 
            border-radius: 12px; border: 1px solid #e0e6ed; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>Đăng nhập Hệ thống</h2>
        <div class="converter-box">
            <input type="text" id="staffIdInput" placeholder="Nhập mã nhân viên (VD: V001)...">
            <button onclick="handleLogin()">Vào Hệ Thống</button>
            <p id="login-msg" style="color: var(--danger-color); margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="main-content">
        <h2 id="welcome-msg">Chào mừng bạn!</h2>
        
        <div class="team-section">
            <div class="member-card">
                <img src="images.jpg" alt="Duc Tho"><p>Duc Tho</p>
            </div>
            <div class="member-card">
                <img src="admin2.jpg" alt="Bảnh Bỏn"><p>Bảnh Bỏn</p>
            </div>
        </div>

        <div class="converter-box">
            <h4>Chuyển đổi Link Shopee</h4>
            <input type="text" id="rawLink" placeholder="Dán link sản phẩm Shopee vào đây...">
            <button onclick="convertLink()">Lấy Link Affiliate</button>
            <p id="result"></p>
        </div>

        <div class="aff-links">
            <h4>Sản phẩm khuyên dùng</h4>
            <a href="#" target="_blank">🛒 Máy tính X99 Cấu Hình Khủng</a>
            <a href="#" target="_blank">🎧 Tai nghe Kiểm âm DJ</a>
        </div>

        <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
    </div>
</div>

<script>
    const myApiUrl = "https://5a6b-2001-ee0-4141-611d-6406-3e56-ace5-639a.ngrok-free.app/convert"; // Cập nhật link Ngrok ở đây

    // --- LOGIC ĐĂNG NHẬP ---
    async function handleLogin() {
        const staffId = document.getElementById('staffIdInput').value.trim().toUpperCase();
        const msg = document.getElementById('login-msg');

        if (!staffId) {
            msg.innerText = "⚠️ Vui lòng nhập mã nhân viên!";
            return;
        }

        try {
            // Tải file employees.json từ GitHub của bạn
            const response = await fetch('employees.json');
            if (!response.ok) throw new Error("Không thấy file employees.json");
            
            const userList = await response.json();

            if (userList[staffId]) {
                const userName = userList[staffId];
                localStorage.setItem('userName', userName);
                localStorage.setItem('staffId', staffId);
                showMainContent(userName);
            } else {
                msg.innerText = "❌ Mã nhân viên không tồn tại!";
            }
        } catch (err) {
            msg.innerText = "⚠️ Lỗi: Kiểm tra file employees.json trên GitHub!";
        }
    }

    function showMainContent(name) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `Chào bạn, ${name}! 👋`;
    }

    function handleLogout() {
        localStorage.clear();
        location.reload();
    }

    // Tự động kiểm tra đăng nhập khi mở trang
    window.onload = () => {
        const savedName = localStorage.getItem('userName');
        if (savedName) showMainContent(savedName);
    }

    // --- LOGIC LẤY LINK (Giữ nguyên bản gốc của Thọ + Gửi staffId) ---
    async function convertLink() {
        const userLink = document.getElementById('rawLink').value.trim();
        const resDiv = document.getElementById('result');
        const staffId = localStorage.getItem('staffId'); 

        if(!userLink) {
            resDiv.style.color = "var(--danger-color)";
            resDiv.innerText = "⚠️ Thọ ơi, vui lòng dán link đã nhé!";
            return;
        }

        const shopeeRegex = /shopee\.vn|shope\.ee/;
        if (!shopeeRegex.test(userLink)) {
            resDiv.style.color = "var(--danger-color)";
            resDiv.innerText = "❌ Link này không phải của Shopee!";
            return;
        }

        resDiv.style.color = "var(--primary-color)";
        resDiv.innerText = "🔍 Đang điều khiển Bot... chờ xíu nhé!";

        try {
            const response = await fetch(myApiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    link: userLink,
                    staff_id: staffId // Gửi kèm mã NV để Bot xử lý Sub_ID
                })
            });
            const data = await response.json();
            
            if (data.error) {
                resDiv.style.color = "var(--danger-color)";
                resDiv.innerText = "⚠️ Shopee báo lỗi link này, kiểm tra lại nhé.";
            } else {
                resDiv.innerHTML = `✅ Xong! <a href="${data.affiliate_link}" target="_blank" style="color: var(--success-color); font-weight: bold;">Mở Link Affiliate</a>`;
            }
        } catch (err) {
            resDiv.style.color = "var(--danger-color)";
            resDiv.innerText = "🚫 Lỗi kết nối Bot (Check Ngrok)!";
        }
    }
</script>
</body>
</html>
