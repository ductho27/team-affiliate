<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Đức Thọ & Affiliate</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-content">
        <div class="container">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 id="welcome-msg">Chào mừng bạn!</h2>
        
                <div class="team-section">
                    <div class="member-card">
                        <img src="images.jpg" alt="Duc Tho"><p>Duc Tho</p>
                    </div>
                    <div class="member-card">
                        <img src="admin2.jpg" alt="Bảnh Bỏn"><p>Bảnh Bỏn</p>
                    </div>
                </div>

            <div class="section-box">
                 <h4>🛒 Chuyển đổi Link Shopee</h4>
                 <input type="text" id="shopeeLink" placeholder="Dán link sản phẩm Shopee...">
                 <button class="btn-convert" onclick="convertLink()">Lấy Link nhận thưởng hoàn tiền</button>
            </div>

            <div class="section-box">
                 <h4 style="color: var(--purple-tho);">🔮 Thầy Thọ Phán Quẻ</h4>
                 <textarea id="fortuneQuestion" placeholder="Hỏi thầy..."></textarea>
                 <button class="btn-fortune" onclick="askMasterTho()">Xem Quẻ Ngay</button>
                 <div id="fortune-result" style="display:none;"></div>
            </div>
        
            </div>
    </div>
</div>

<script src="script.js"></script>
</body>
<div class="night">
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
</div>
</html>
