<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Đức Thọ & Affiliate</title>
    
    <link rel="stylesheet" href="style.css">

    <script type="text/javascript">
        var _atsmarttag = { pub_id: '5318594335759026755' }; //
        (function () {
            var script = document.createElement('script');
            script.src = '//static.accesstrade.vn/js/v2/atsmarttag.min.js?v=1.1.0'; //
            script.type = 'text/javascript';
            script.async = true;

<body>

<div class="container">
    <div id="login-screen">
        <h2>🔐 Hệ Thống Team Thọ</h2>
        <input type="text" id="staffIdInput" placeholder="Nhập mã nhân viên của bạn...">
        <button class="btn btn-login" onclick="handleLogin()">VÀO HỆ THỐNG</button>
        <p id="login-msg" style="color: red; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div id="main-content">
        <h2 id="welcome-msg">Chào mừng bạn!</h2>

        <div class="converter-box">
            <p style="font-weight: bold;">Chuyển đổi Link Shopee:</p>
            <input type="text" id="rawLink" placeholder="Dán link Shopee tại đây...">
            <button class="btn btn-convert" onclick="generateLink()">TẠO LINK MUA HÀNG</button>
        </div>

        <div id="result-box">
            <p style="color: #2e7d32; font-weight: bold;">🎉 KÈO THƠM CHO BẠN!</p>
            <div style="background: #fff; border: 2px solid #ffc107; padding: 15px; border-radius: 15px; margin: 10px 0;">
                <p style="margin: 5px 0; color: #d32f2f; font-weight: bold; font-size: 1.1rem;">
                🎁 TỶ LỆ HOÀN TIỀN CỦA BẠN: <span id="percent-amount">4.5%</span>
                </p>
                <p style="font-size: 0.85rem; color: #555;">(Tỷ lệ này áp dụng trên tổng giá trị đơn hàng bạn mua!)</p>
            </div>

            <a href="#" id="finalLink" target="_blank" class="buy-now-btn">🚀 ẤN VÀO MUA NGAY 🛒</a>

            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                <p style="font-size: 0.9rem; font-weight: bold; color: #0056b3;">Muốn nhận nhiều hoa hồng hơn?</p>
                <a href="https://zalo.me/0328982137" target="_blank" class="shake-animation">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" width="25" alt="Zalo">
                    LIÊN HỆ ADMIN QUA ZALO
                </a>
            </div>
        </div>

        <button class="btn btn-logout" onclick="handleLogout()">Đăng xuất</button>
    </div>
</div>

<script src="script.js"></script>

</html>
