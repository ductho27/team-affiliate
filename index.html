<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Mua Sắm - Team Thọ</title>

    <script type="text/javascript">
        var _atsmarttag = { pub_id: '5318594335759026755' };
        (function () {
            var script = document.createElement('script');
            script.src = '//static.accesstrade.vn/js/v2/atsmarttag.min.js?v=1.1.0';
            script.type = 'text/javascript';
            script.async = true;
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
        })();
    </script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-light: #ff5722;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { 
            max-width: 500px; width: 100%;
            background: white; padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: var(--shopee-orange); margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        .converter-box { 
            background: #fff5f1; padding: 20px; 
            border-radius: 20px; border: 2px dashed var(--shopee-orange);
            margin-bottom: 20px;
        }

        input { 
            width: 100%; box-sizing: border-box;
            padding: 15px; border: 1px solid #ddd; 
            border-radius: 12px; margin-bottom: 15px; 
            font-size: 15px; outline: none;
        }

        input:focus { border-color: var(--shopee-orange); box-shadow: 0 0 8px rgba(238, 77, 45, 0.2); }

        .btn-convert { 
            width: 100%; background: var(--shopee-orange); 
            color: white; border: none; padding: 16px; 
            border-radius: 12px; cursor: pointer; 
            font-size: 17px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(238, 77, 45, 0.3);
            transition: all 0.3s ease;
        }

        .btn-convert:hover { background: var(--shopee-light); transform: translateY(-2px); }

        #result-box {
            display: none; margin-top: 25px; padding: 20px;
            background: #e8f5e9; border-radius: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .cta-text { color: #2e7d32; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }

        .buy-now-btn {
            display: inline-block; width: 100%;
            background: #28a745; color: white;
            text-decoration: none; padding: 15px;
            border-radius: 12px; font-weight: bold;
            font-size: 1.2rem; margin-top: 10px;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .buy-now-btn:blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.8; } }

        .footer-note { font-size: 0.8rem; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛍️ Shopping Team Thọ</h2>
    <p class="subtitle">Dán link Shopee để ủng hộ hoa hồng cho Team nhé!</p>

    <div class="converter-box">
        <input type="text" id="rawLink" placeholder="Dán link sản phẩm Shopee tại đây...">
        <button class="btn-convert" onclick="generateLink()">TẠO LINK MUA HÀNG</button>
    </div>

    <div id="result-box">
        <div class="cta-text">🎉 Đã tạo link thành công!</div>
        <p style="font-size: 0.9rem; color: #444;">Bạn hãy ấn vào nút bên dưới để bắt đầu mua sắm và ủng hộ hoa hồng cho mình nhé:</p>
        
        <a href="#" id="finalLink" target="_blank" class="buy-now-btn">
             🚀 ẤN VÀO MUA NGAY 🛒
        </a>
        
        <p style="margin-top: 15px; font-size: 0.8rem; color: #666;">(Sau khi ấn, hệ thống sẽ tự chuyển hướng đến Shopee)</p>
    </div>

    <p class="footer-note">Cảm ơn bạn đã đồng hành cùng Đức Thọ!</p>
</div>

<script>
    function generateLink() {
        const userLink = document.getElementById('rawLink').value.trim();
        const resultBox = document.getElementById('result-box');
        const finalLink = document.getElementById('finalLink');

        if(!userLink || !userLink.includes('shopee.vn') && !userLink.includes('shope.ee')) {
            alert("Thọ ơi, dán đúng link Shopee mới được nhé!");
            return;
        }

        // Gắn thêm utm_source để Thọ dễ theo dõi trên AccessTrade
        const cleanLink = userLink.split('?')[0]; // Lấy link sạch
        const affLink = `${cleanLink}?utm_source=ban_be_ung_ho`;

        finalLink.href = affLink;
        resultBox.style.display = "block";
        
        // Cuộn xuống kết quả
        resultBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
