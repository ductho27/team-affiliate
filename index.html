<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Đức Thọ - Affiliate System</title>

    <script type="text/javascript">
        var _atsmarttag = { pub_id: '5318594335759026755' };
        (function () {
            var script = document.createElement('script');
            script.src = '//static.accesstrade.vn/js/v2/atsmarttag.min.js?v=1.1.0';
            script.type = 'text/javascript';
            script.async = true;
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
        })();
    </script>

    <style>
        :root {
            --primary: #0056b3;
            --shopee-orange: #ee4d2d;
            --success: #28a745;
            --bg: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container { 
            max-width: 500px; width: 100%; background: white; 
            padding: 30px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { color: var(--shopee-orange); text-align: center; margin-bottom: 20px; }
        
        /* Màn hình đăng nhập */
        .login-box { padding: 10px 0; text-align: center; }
        
        /* Nội dung chính */
        #main-content { display: none; }

        .converter-box { 
            background: #fff5f1; padding: 20px; 
            border-radius: 20px; border: 2px dashed var(--shopee-orange);
            margin: 20px 0;
        }

        input { 
            width: 100%; box-sizing: border-box; padding: 14px; 
            border: 1px solid #ddd; border-radius: 12px; 
            margin-bottom: 15px; font-size: 16px; outline: none;
        }

        .btn { 
            width: 100%; border: none; padding: 16px; 
            border-radius: 12px; cursor: pointer; 
            font-size: 16px; font-weight: bold; transition: 0.3s;
        }

        .btn-login { background: var(--primary); color: white; }
        .btn-convert { background: var(--shopee-orange); color: white; box-shadow: 0 4px 12px rgba(238, 77, 45, 0.2); }
        .btn-logout { background: #6c757d; color: white; margin-top: 20px; padding: 10px; font-size: 14px; }

        /* Kết quả link */
        #result-box {
            display: none; margin-top: 25px; padding: 20px;
            background: #e8f5e9; border-radius: 15px; text-align: center;
        }

        .buy-now-btn {
            display: inline-block; width: 100%; box-sizing: border-box;
            background: var(--success); color: white;
            text-decoration: none; padding: 16px;
            border-radius: 12px; font-weight: bold;
            font-size: 1.1rem; margin-top: 10px;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }

        .welcome-user { font-weight: bold; color: #333; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="login-box">
        <h2>🔐 Đăng Nhập Hệ Thống</h2>
        <p style="color: #666; margin-bottom: 20px;">Vui lòng nhập mã nhân viên của bạn</p>
        <input type="text" id="staffIdInput" placeholder="Nhập mã nhân viên (VD: V001)...">
        <button class="btn btn-login" onclick="handleLogin()">VÀO HỆ THỐNG</button>
        <p id="login-msg" style="color: red; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div id="main-content">
        <h2>🛍️ Team Thọ Affiliate</h2>
        <span id="welcome-msg" class="welcome-user"></span>

        <div class="converter-box">
            <p style="font-weight: bold; margin-bottom: 10px;">Chuyển đổi Link Shopee:</p>
            <input type="text" id="rawLink" placeholder="Dán link sản phẩm Shopee vào đây...">
            <button class="btn btn-convert" onclick="generateLink()">TẠO LINK MUA HÀNG</button>
        </div>

        <div id="result-box">
            <p style="color: #2e7d32; font-weight: bold; margin-bottom: 5px;">🎉 Thành công!</p>
            <p style="font-size: 0.9rem; color: #444;">Gửi nút bên dưới cho khách hoặc bạn bè để nhận hoa hồng:</p>
            
            <a href="#" id="finalLink" target="_blank" class="buy-now-btn">
                 🚀 ẤN VÀO MUA NGAY 🛒
            </a>
        </div>

        <button class="btn btn-logout" onclick="handleLogout()">Đăng xuất tài khoản</button>
    </div>
</div>

<script>
    // --- QUẢN LÝ ĐĂNG NHẬP ---
    async function handleLogin() {
        const staffId = document.getElementById('staffIdInput').value.trim().toUpperCase();
        const msg = document.getElementById('login-msg');

        if (!staffId) {
            msg.innerText = "⚠️ Chưa nhập mã Thọ ơi!";
            return;
        }

        try {
            // Fetch file từ GitHub của bạn
            const response = await fetch('employees.json');
            const userList = await response.json();

            if (userList[staffId]) {
                const userName = userList[staffId];
                localStorage.setItem('userName', userName);
                localStorage.setItem('staffId', staffId);
                showMainContent(userName);
            } else {
                msg.innerText = "❌ Mã này không có trong danh sách!";
            }
        } catch (err) {
            msg.innerText = "⚠️ Lỗi: Không thấy file employees.json!";
        }
    }

    function showMainContent(name) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('welcome-msg').innerText = `Chào bạn, ${name}! 👋`;
    }

    function handleLogout() {
        localStorage.clear();
        location.reload();
    }

    window.onload = () => {
        const savedName = localStorage.getItem('userName');
        if (savedName) showMainContent(savedName);
    }

    // --- TẠO LINK GỬI BẠN BÈ ---
    function generateLink() {
        const userLink = document.getElementById('rawLink').value.trim();
        const resultBox = document.getElementById('result-box');
        const finalLink = document.getElementById('finalLink');
        const staffId = localStorage.getItem('staffId') || "THO_TEAM";

        if(!userLink.includes('shopee.vn') && !userLink.includes('shope.ee')) {
            alert("Dán link Shopee mới chuẩn Thọ nhé!");
            return;
        }

        // Gắn staffId vào SubID (utm_content) để AccessTrade ghi nhận cho đúng người
        let separator = userLink.includes('?') ? '&' : '?';
        const affLink = `${userLink}${separator}utm_content=${staffId}&utm_source=ThoAffiliate`;

        finalLink.href = affLink;
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
