<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Đức Thọ & Affiliate</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-content">
        <h2 style="color: var(--purple-tho);">Chào mừng bạn đến với văn phòng Thầy Thọ! 👋</h2>
    
        </div>
        
        <div class="team-section">
            <div class="member-card">
                <img src="images.jpg" alt="Duc Tho"><p>Duc Tho</p>
            </div>
            <div class="member-card">
                <img src="admin2.jpg" alt="Bảnh Bỏn"><p>Bảnh Bỏn</p>
            </div>
        </div>

        <div class="converter-box">
            <h4>🛒 Chuyển đổi Link Shopee</h4>
            <input type="text" id="rawLink" placeholder="Dán link sản phẩm Shopee...">
            <button onclick="convertLink()">Lấy Link nhận thưởng hoàn tiền</button>
            <div id="result"></div>
        </div>

        <div class="div-purple-tho-small" style="position: relative;">
            <h4>🔮 Thầy Thọ Phán Quẻ</h4>

            <div class="magic-input-container">
                <div class="fire-ghastly" id="ghastlyFire"></div>
        
                <textarea id="fortuneQuestion" 
                      placeholder="Hỏi thầy: Muốn bói chính xác thì cho thầy họ tên đầy đủ, ngày tháng năm sinh và câu hỏi con muốn hỏi thầy?"
                      rows="3"
                      oninput="updateFireSize()"></textarea> </div>

            <button class="btn-fortune" onclick="askMasterTho()">Xem Quẻ Ngay</button>
        </div>
        
        <div class="aff-links">
            <h4>Sản phẩm khuyên dùng</h4>
            <a href="#" target="_blank">💻 Máy tính X99 Cấu Hình Khủng</a>
            <a href="#" target="_blank">🎧 Tai nghe Kiểm âm DJ</a>
        </div>

        <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
    </div>
</div>

<script src="script.js"></script>
</body>
<div class="night">
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
  <div class="shooting_star"></div>
</div>
</html>
